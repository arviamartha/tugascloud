<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pop Balloon Game</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    overflow: hidden;
    text-align: center;
    color: white;
  }

  h1 { margin: 10px; }

  #score, #time {
    font-size: 18px;
    margin: 5px;
  }

  #gameArea {
    position: relative;
    width: 100%;
    height: 80vh;
  }

  .balloon {
    position: absolute;
    font-size: 40px;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .balloon:active {
    transform: scale(1.3);
  }

  #startBtn {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #333;
    font-weight: bold;
    cursor: pointer;
  }

  #startBtn:hover {
    opacity: 0.8;
  }
</style>
</head>

<body>

<h1>🎈 Pop Balloon Game</h1>
<div id="score">Score: 0</div>
<div id="time">Time: 20</div>
<button id="startBtn" onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<script>
let score = 0;
let timeLeft = 20;
let gameInterval;
let spawnInterval;

function startGame() {
  score = 0;
  timeLeft = 20;
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("time").innerText = "Time: " + timeLeft;

  gameInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = "Time: " + timeLeft;

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);

  spawnInterval = setInterval(spawnBalloon, 700);
}

function spawnBalloon() {
  const gameArea = document.getElementById("gameArea");
  const balloon = document.createElement("div");

  balloon.classList.add("balloon");
  balloon.innerText = "🎈";

  const x = Math.random() * (window.innerWidth - 50);
  const y = Math.random() * (window.innerHeight - 150);

  balloon.style.left = x + "px";
  balloon.style.top = y + "px";

  balloon.onclick = () => {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    balloon.remove();
  };

  gameArea.appendChild(balloon);

  setTimeout(() => {
    balloon.remove();
  }, 1500);
}

function endGame() {
  clearInterval(gameInterval);
  clearInterval(spawnInterval);
  alert("Game Over! Score kamu: " + score);
}
</script>

</body>
</html>
